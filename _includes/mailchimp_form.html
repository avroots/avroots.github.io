                    <input type="text" name="b_4ce31c149f84c6493fb517a2c_d99fb4a009" tabindex="-1" autocomplete="off"

    <script type="text/javascript">
        (function () {
            var form = document.getElementById("mc-embedded-subscribe-form");
            if (!form) {
                return;
            }

            var minSubmitDelayMs = 3000;
            var formLoadedAt = Date.now();
            var honeypot = form.querySelector('input[name="b_4ce31c149f84c6493fb517a2c_d99fb4a009"]');
            var errorResponse = document.getElementById("mce-error-response");
            var successResponse = document.getElementById("mce-success-response");

            form.addEventListener("submit", function (event) {
                var submittedTooFast = Date.now() - formLoadedAt < minSubmitDelayMs;
                var honeypotFilled = honeypot && honeypot.value.trim() !== "";

                if (!submittedTooFast && !honeypotFilled) {
                    return;
                }

                event.preventDefault();

                if (successResponse) {
                    successResponse.style.display = "none";
                }

                if (errorResponse) {
                    errorResponse.style.display = "block";
                    errorResponse.textContent = "Aanmelding mislukt. Probeer het opnieuw.";
                }
            });
        })();
    </script>
